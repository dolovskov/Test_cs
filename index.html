html, body {
  background: #0e0c0a;
  color: #f5e9d3;

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: #0e0c0a;
  border-bottom: 2px solid #44403c;
  padding: 12px 16px;

  align-items: center;
  gap: 12px;
}
.header-icon, .header-back {

  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.header-icon {
  border: 1px solid #d4733a;
  background: #1c1917;
}
.header-back {
  margin-left: -8px;
}
.header-back:active {
  background: #292524;
}
.header-title-block { flex: 1; min-width: 0; }
.header-title {
  font-family: ui-monospace, monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #fafaf9;
}
.header-title .accent { color: #d4733a; }
.header-sub {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-reset {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #d6d3d1;

  padding: 4px 8px;
  flex-shrink: 0;
}
.header-reset:active { color: #d4733a; }

/* Main content */
.main {
  padding: 24px 16px 40px;
}
.step-label {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
  letter-spacing: 0.15em;
  margin-bottom: 4px;
}
.step-title {
  font-family: ui-monospace, monospace;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #fafaf9;
  margin-bottom: 24px;
}
.step-title .accent { color: #d4733a; }

/* Cards (map/round/tactic list items) */
.card-list { display: flex; flex-direction: column; gap: 12px; }
.card {
  display: block;
  width: 100%;
  background: #1c1917;
  border: 1px solid #57534e;
  padding: 16px;
  transition: border-color 0.15s;
}
.card:active { border-color: #d4733a; }
.card.disabled { opacity: 0.4; }

.card-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.card-thumb {
  width: 56px;
  height: 56px;
  border: 1px solid #d4733a;
  background: #0e0c0a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  font-weight: 700;
  color: #d4733a;
  flex-shrink: 0;
}
.card.disabled .card-thumb { border-color: #44403c; color: #78716c; }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-family: ui-monospace, monospace;
  font-size: 17px;
  font-weight: 700;
  color: #fafaf9;
}
.card.disabled .card-title { color: #a8a29e; }
.card-meta {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #a8a29e;
  letter-spacing: 0.1em;
  margin-top: 2px;
}
.card-arrow {
  color: #d4733a;
  font-size: 22px;
  flex-shrink: 0;
}
.card-lock {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #a8a29e;
  flex-shrink: 0;
}

/* Round type card */
.round-card-content {
  display: flex;
  align-items: center;
  gap: 16px;
}
.round-info { flex: 1; }
.round-name-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.round-name {
  font-family: ui-monospace, monospace;
  font-size: 17px;
  font-weight: 700;
  color: #fafaf9;
}
.round-sub {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
}
.round-desc {
  font-size: 12px;
  color: #e7e5e4;
  margin-top: 4px;
  line-height: 1.4;
}
.round-count {
  text-align: right;
  flex-shrink: 0;
}
.round-count-label {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
}
.round-count-num {
  font-family: ui-monospace, monospace;
  font-size: 24px;
  font-weight: 700;
  color: #d4733a;
}

.side-btn {
  display: block;
  width: 100%;
  background: #1c1917;
  padding: 20px;
  border: 2px solid;
  transition: border-color 0.15s;
}
.side-btn.t { border-color: #9a3412; }
.side-btn.ct { border-color: #1e40af; }
.side-btn.t:active { border-color: #fb923c; }
.side-btn.ct:active { border-color: #60a5fa; }
.side-btn-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.side-icon {
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.side-btn.t .side-icon { background: #1c0a05; border: 1px solid #fb923c; color: #fb923c; }
.side-btn.ct .side-icon { background: #0a1428; border: 1px solid #60a5fa; color: #60a5fa; }
.side-name {
  font-family: ui-monospace, monospace;
  font-size: 19px;
  font-weight: 700;
}
.side-btn.t .side-name { color: #fed7aa; }
.side-btn.ct .side-name { color: #dbeafe; }
.side-meta {
  font-family: ui-monospace, monospace;

.side-btn.t .side-meta { color: #fdba74; }
.side-btn.ct .side-meta { color: #93c5fd; }

.map-container {

.map-label {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
  letter-spacing: 0.15em;
  margin-bottom: 8px;

.tactic-card {
  display: block;
  width: 100%;
  background: #1c1917;
  border: 1px solid #57534e;
  padding: 16px;
  transition: border-color 0.15s;
}
.tactic-card:active { border-color: #d4733a; }
.tactic-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.tactic-card-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.tactic-num {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: #d6d3d1;
  flex-shrink: 0;
}
.tactic-name {
  font-family: ui-monospace, monospace;
  font-size: 17px;
  font-weight: 700;
  color: #fafaf9;
}
.tactic-tag {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d4733a;
  letter-spacing: 0.1em;
  padding-left: 28px;
  margin-bottom: 4px;
}
.tactic-desc {
  font-size: 12px;
  color: #e7e5e4;
  line-height: 1.5;
  padding-left: 28px;
}
.tactic-utility {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
  padding-left: 28px;
}

/* Difficulty badge */
.diff-badge {
  display: inline-block;
  padding: 3px 8px;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  border: 1px solid;
  flex-shrink: 0;
}
.diff-easy { background: rgba(6,78,59,0.6); border-color: #10b981; color: #6ee7b7; }
.diff-medium { background: rgba(120,53,15,0.6); border-color: #f59e0b; color: #fcd34d; }
.diff-hard { background: rgba(136,19,55,0.6); border-color: #f43f5e; color: #fda4af; }

/* Utility chip */
.util-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: #292524;
  border: 1px solid #57534e;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: #f5f5f4;
}

.util-chip.smoke svg { color: #e7e5e4; }
.util-chip.flash svg { color: #fde047; }
.util-chip.molly svg { color: #fb923c; }
.util-chip.he svg { color: #f87171; }

.detail-section {
  margin-bottom: 20px;
}
.detail-title-block {
  margin-bottom: 16px;
}
.detail-breadcrumb {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.detail-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.detail-title {
  font-family: ui-monospace, monospace;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: #fafaf9;
  line-height: 1.2;
}
.detail-tag {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: #d4733a;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.detail-desc {
  font-size: 14px;
  color: #f5f5f4;
  line-height: 1.5;
}

.section-box {
  background: #1c1917;
  border: 1px solid #57534e;
  padding: 16px;
  margin-bottom: 16px;
}
.section-box.buy {
  border-left: 4px solid #d4733a;
}
.section-box.tips {
  background: rgba(66,32,6,0.3);
  border-color: #a16207;
}
.section-label {
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #d6d3d1;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
}
.section-label.tips-label { color: #fcd34d; }
.buy-text {
  font-family: ui-monospace, monospace;
  font-size: 13px;
  color: #fafaf9;
  line-height: 1.5;
}

/* Roles */
.role-list { display: flex; flex-direction: column; }
.role-item {
  display: flex;
  gap: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #44403c;
  margin-bottom: 12px;
}
.role-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.role-num {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  border: 1px solid #d4733a;
  background: #1c0a05;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: ui-monospace, monospace;
  font-size: 12px;
  font-weight: 700;
  color: #fdba74;
}
.role-body { flex: 1; min-width: 0; }
.role-name {
  font-family: ui-monospace, monospace;
  font-size: 12px;
  font-weight: 700;
  color: #fed7aa;
  margin-bottom: 4px;
}
.role-task {
  font-size: 12px;
  color: #f5f5f4;
  line-height: 1.5;
}

/* Execute steps */
.exec-list { display: flex; flex-direction: column; gap: 12px; }
.exec-item {
  display: flex;
  gap: 12px;
}
.exec-num {
  font-family: ui-monospace, monospace;
  font-size: 12px;
  font-weight: 700;
  color: #d4733a;
  margin-top: 2px;
  flex-shrink: 0;
}
.exec-text {
  font-size: 12px;
  color: #f5f5f4;
  line-height: 1.5;
  flex: 1;
}

/* Tips */
.tips-list { display: flex; flex-direction: column; gap: 8px; }
.tip-item {
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: #f5f5f4;
  line-height: 1.5;
}
.tip-arrow { color: #fcd34d; flex-shrink: 0; }

.empty-state {
  color: #d6d3d1;
  font-family: ui-monospace, monospace;
  font-size: 13px;
  padding: 24px;
  border: 1px solid #57534e;
  text-align: center;
  background: #1c1917;
}
.footer-note {
  text-align: center;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #a8a29e;
  letter-spacing: 0.1em;
  padding-top: 8px;
}
.intro-note {
  margin-top: 16px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: #d6d3d1;
  letter-spacing: 0.05em;
}
</style>

// ============================================================
// HTML escape + utility chip
// ============================================================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function utilChip(item) {
  const lower = item.toLowerCase();
  let cls = 'smoke', icon = ICONS.cloud;
  if (lower.includes('моло')) { cls = 'molly'; icon = ICONS.flame; }
  else if (lower.includes('флеш')) { cls = 'flash'; icon = ICONS.zap; }
  else if (lower.includes('he')) { cls = 'he'; icon = ICONS.bomb_sm; }
  return `<span class="util-chip ${cls}">${icon}${esc(item)}</span>`;
}

function diffBadge(diff) {
  const labels = { easy: 'ПРОСТАЯ', medium: 'СРЕДНЯЯ', hard: 'СЛОЖНАЯ' };
  return `<span class="diff-badge diff-${diff}">${labels[diff]}</span>`;
}

// ============================================================
// STATE + ROUTER
// ============================================================
const state = {
  step: 'map',     // map → side → round → list → detail
  map: null,
  side: null,
  round: null,
  tactic: null,
};

function navigate(step) {
  state.step = step;
  window.scrollTo(0, 0);
  render();
}

function goBack() {
  const order = ['map', 'side', 'round', 'list', 'detail'];
  const i = order.indexOf(state.step);
  if (i > 0) navigate(order[i-1]);
}

function reset() {
  state.step = 'map';
  state.map = null;
  state.side = null;
  state.round = null;
  state.tactic = null;
  render();
}

// ============================================================
// VIEWS
// ============================================================
function viewHeader() {
  let sub = '';
  if (state.step === 'map') sub = 'ВЫБОР КАРТЫ';
  else if (state.step === 'side') sub = `${state.map.name.toUpperCase()} / СТОРОНА`;
  else if (state.step === 'round') sub = `${state.map.name.toUpperCase()} · ${state.side} / РАУНД`;
  else if (state.step === 'list') sub = `${state.map.name.toUpperCase()} · ${state.side} · ${state.round.name.toUpperCase()}`;
  else if (state.step === 'detail') sub = `БРИФИНГ // ${state.tactic.name.toUpperCase()}`;

  const left = state.step === 'map'
    ? `<div class="header-icon">${ICONS.target}</div>`
    : `<button class="header-back" onclick="goBack()" aria-label="Назад">${ICONS.back}</button>`;

  const reset = state.step !== 'map'
    ? `<button class="header-reset" onclick="reset()">СБРОС</button>`
    : '';

  return `<div class="header">
    ${left}
    <div class="header-title-block">
      <div class="header-title">TACTICAL<span class="accent">/</span>OPS</div>
      <div class="header-sub">${esc(sub)}</div>
    </div>
    ${reset}
  </div>`;
}

function viewMapStep() {
  const cards = MAPS.map(m => {
    if (m.available) {
      return `<button class="card" onclick="selectMap('${m.id}')">
        <div class="card-row">
          <div class="card-thumb">${m.id.slice(0,3).toUpperCase()}</div>
          <div class="card-body">
            <div class="card-title">${esc(m.name)}</div>
            <div class="card-meta">${esc(m.code)}</div>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </button>`;
    }
    return `<div class="card disabled">
      <div class="card-row">
        <div class="card-thumb">${m.id.slice(0,3).toUpperCase()}</div>
        <div class="card-body">
          <div class="card-title">${esc(m.name)}</div>
          <div class="card-meta">${esc(m.code)}</div>
        </div>
        <div class="card-lock">${ICONS.lock} СКОРО</div>
      </div>
    </div>`;
  }).join('');

  return `<div>
    <div class="step-label">// STEP 01</div>
    <h2 class="step-title">Выбери <span class="accent">карту</span></h2>
    <div class="card-list">${cards}</div>
    <div class="intro-note">// Сейчас доступны Mirage и Dust 2. Остальные карты — в разработке.</div>
  </div>`;
}

function viewSideStep() {
  return `<div>
    <div class="step-label">// STEP 02</div>
    <h2 class="step-title">За кого <span class="accent">играешь</span>?</h2>
    <div class="map-container">
      <div class="map-label">// ${esc(state.map.code)} · СХЕМА КАРТЫ</div>
      ${getMapDiagramSVG(state.map.id)}
    </div>
    <div class="card-list">
      <button class="side-btn t" onclick="selectSide('T')">
        <div class="side-btn-row">
          <div class="side-icon">${ICONS.bomb}</div>
          <div style="flex:1">
            <div class="side-name">TERRORISTS</div>
            <div class="side-meta">Атака · плант бомбы</div>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </button>
      <button class="side-btn ct" onclick="selectSide('CT')">
        <div class="side-btn-row">
          <div class="side-icon">${ICONS.users}</div>
          <div style="flex:1">
            <div class="side-name">COUNTER-TERRORISTS</div>
            <div class="side-meta">Защита · дефьюз</div>
          </div>
          <div class="card-arrow">›</div>
        </div>
      </button>
    </div>
  </div>`;
}

function viewRoundStep() {
  const cards = ROUND_TYPES.map(r => {
    const list = TACTICS[`${state.map.id}-${state.side}-${r.id}`] || [];
    const count = list.length;
    if (count === 0) {
      return `<div class="card disabled">
        <div class="round-card-content">
          <div class="round-info">
            <div class="round-name-row">
              <span class="round-name">${esc(r.name)}</span>
              <span class="round-sub">${esc(r.sub)}</span>
            </div>
            <div class="round-desc">${esc(r.desc)}</div>
          </div>
          <div class="round-count">
            <div class="round-count-label">ТАКТИК</div>
            <div class="round-count-num">0</div>
          </div>
        </div>
      </div>`;
    }
    return `<button class="card" onclick="selectRound('${r.id}')">
      <div class="round-card-content">
        <div class="round-info">
          <div class="round-name-row">
            <span class="round-name">${esc(r.name)}</span>
            <span class="round-sub">${esc(r.sub)}</span>
          </div>
          <div class="round-desc">${esc(r.desc)}</div>
        </div>
        <div class="round-count">
          <div class="round-count-label">ТАКТИК</div>
          <div class="round-count-num">${count}</div>
        </div>
      </div>
    </button>`;
  }).join('');

  return `<div>
    <div class="step-label">// STEP 03</div>
    <h2 class="step-title">Тип <span class="accent">раунда</span></h2>
    <div class="card-list">${cards}</div>
  </div>`;
}

function viewListStep() {
  const list = TACTICS[`${state.map.id}-${state.side}-${state.round.id}`] || [];
  if (list.length === 0) {
    return `<div>
      <div class="step-label">// STEP 04</div>
      <h2 class="step-title">Доступные <span class="accent">тактики</span></h2>
      <div class="empty-state">// Тактики для этой комбинации скоро появятся</div>
    </div>`;
  }
  const cards = list.map((t, i) => {
    const tagHtml = t.tag ? `<div class="tactic-tag">// ${esc(t.tag)}</div>` : '';
    const utility = t.utility.map(utilChip).join('');
    return `<button class="tactic-card" onclick="selectTactic('${t.id}')">
      <div class="tactic-card-header">
        <div class="tactic-card-title-row">
          <span class="tactic-num">#${String(i+1).padStart(2,'0')}</span>
          <span class="tactic-name">${esc(t.name)}</span>
        </div>
        ${diffBadge(t.diff)}
      </div>
      ${tagHtml}
      <div class="tactic-desc">${esc(t.desc)}</div>
      <div class="tactic-utility">${utility}</div>
    </button>`;
  }).join('');

  return `<div>
    <div class="step-label">// STEP 04</div>
    <h2 class="step-title">Доступные <span class="accent">тактики</span></h2>
    <div class="card-list">${cards}</div>
  </div>`;
}

function viewDetailStep() {
  const t = state.tactic;
  const tagHtml = t.tag ? `<div class="detail-tag">// ${esc(t.tag)}</div>` : '';
  const videoHtml = t.video ? '<div class="section-box"><div class="section-label">// ВИДЕО РАСКИДКИ</div><a href="' + t.video + '" target="_blank" style="display:inline-flex;align-items:center;gap:8px;color:#fcd34d;font-family:ui-monospace,monospace;font-size:13px;text-decoration:none;border:1px solid #a16207;padding:10px 14px;background:rgba(66,32,6,0.3)">▶ Смотреть раскидки на YouTube</a></div>' : '';
  const buyHtml = t.buy ? `<div class="section-box buy">
    <div class="section-label">// ЗАКУП</div>
    <div class="buy-text">${esc(t.buy)}</div>
  </div>` : '';
  const utility = t.utility.map(utilChip).join('');
  const roles = t.players.map((p, i) => `<div class="role-item">
    <div class="role-num">${i+1}</div>
    <div class="role-body">
      <div class="role-name">${esc(p.role)}</div>
      <div class="role-task">${esc(p.task)}</div>
    </div>
  </div>`).join('');
  const execSteps = t.execute.map((step, i) => `<div class="exec-item">
    <div class="exec-num">${String(i+1).padStart(2,'0')}</div>
    <div class="exec-text">${esc(step)}</div>
  </div>`).join('');
  const tipsHtml = (t.tips && t.tips.length > 0) ? `<div class="section-box tips">
    <div class="section-label tips-label">// ВАЖНЫЕ НЮАНСЫ</div>
    <div class="tips-list">
      ${t.tips.map(tip => `<div class="tip-item"><span class="tip-arrow">▸</span><span>${esc(tip)}</span></div>`).join('')}
    </div>
  </div>` : '';

  return `<div>
    <div class="detail-title-block">
      <div class="detail-breadcrumb">// ${esc(state.map.name.toUpperCase())} · ${state.side} · ${esc(state.round.name.toUpperCase())}</div>
      <div class="detail-title-row">
        <h2 class="detail-title">${esc(t.name)}</h2>
        ${diffBadge(t.diff)}
      </div>
      ${tagHtml}
      <p class="detail-desc">${esc(t.desc)}</p>
    </div>
    <div class="map-container">
      <div class="map-label">// КАРТА</div>
      ${getMapDiagramSVG(state.map.id)}
    </div>
    ${buyHtml}
    ${videoHtml}
    <div class="section-box">
      <div class="section-label">// УТИЛКА КОМАНДЫ</div>
      <div class="tactic-utility" style="padding-left:0;margin-top:0">${utility}</div>
    </div>
    <div class="section-box">
      <div class="section-label">// РОЛИ ИГРОКОВ</div>
      <div class="role-list">${roles}</div>
    </div>
    <div class="section-box">
      <div class="section-label">// ИСПОЛНЕНИЕ ШАГ ЗА ШАГОМ</div>
      <div class="exec-list">${execSteps}</div>
    </div>
    ${tipsHtml}
    <div class="footer-note">// GLHF · GOOD LUCK HAVE FUN</div>
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function selectMap(id) {
  state.map = MAPS.find(m => m.id === id);
  navigate('side');
}
function selectSide(side) {
  state.side = side;
  navigate('round');
}
function selectRound(id) {
  state.round = ROUND_TYPES.find(r => r.id === id);
  navigate('list');
}
function selectTactic(id) {
  const list = TACTICS[`${state.map.id}-${state.side}-${state.round.id}`] || [];
  state.tactic = list.find(t => t.id === id);
  navigate('detail');
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  let body = '';
  if (state.step === 'map') body = viewMapStep();
  else if (state.step === 'side') body = viewSideStep();
  else if (state.step === 'round') body = viewRoundStep();
  else if (state.step === 'list') body = viewListStep();
  else if (state.step === 'detail') body = viewDetailStep();

  document.getElementById('app').innerHTML = viewHeader() + `<div class="main">${body}</div>`;
}

render();
</script>
</body>
</html>
